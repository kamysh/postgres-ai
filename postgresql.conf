listen_addresses = '*'
port = 5432
max_connections = 100
shared_buffers = 128MB
hba_file = '/etc/postgresql/pg_hba.conf'
ident_file = '/etc/postgresql/pg_ident.conf'
data_directory = '/var/lib/postgresql/data'

# Apache AGE requires preload to register agtype operators (e.g. @>)
# and the cypher() function.
shared_preload_libraries = 'age'

# Ensure ag_catalog operators resolve by default for all roles/databases.
search_path = 'ag_catalog, "$user", public'
