name: Build and push Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14
        with:
          flakehub: false

      - name: Build Docker image
        run: |
          nix build .#dockerImage
          docker load < result

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kamysh
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        run: |
          docker tag postgres-ai:latest kamysh/postgres-ai:latest
          docker push kamysh/postgres-ai:latest

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            docker tag postgres-ai:latest kamysh/postgres-ai:$TAG
            docker push kamysh/postgres-ai:$TAG
          fi

      - name: Update Docker Hub description
        run: |
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"kamysh\",\"password\":\"${{ secrets.DOCKERHUB_TOKEN }}\"}" \
            https://hub.docker.com/v2/users/login | jq -r .token)
          curl -s -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"full_description\":$(jq -Rs . < DOCKER_HUB.md)}" \
            https://hub.docker.com/v2/repositories/kamysh/postgres-ai/
