name: Build and push Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: amd64
          - runner: ubuntu-24.04-arm
            platform: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14
        with:
          flakehub: false

      - name: Build Docker image
        run: |
          nix build .#dockerImage
          docker load < result

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kamysh
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push platform image
        run: |
          docker tag postgres-ai:latest kamysh/postgres-ai:latest-${{ matrix.platform }}
          docker push kamysh/postgres-ai:latest-${{ matrix.platform }}

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            docker tag postgres-ai:latest kamysh/postgres-ai:$TAG-${{ matrix.platform }}
            docker push kamysh/postgres-ai:$TAG-${{ matrix.platform }}
          fi

  manifest:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kamysh
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker manifest create kamysh/postgres-ai:latest \
            kamysh/postgres-ai:latest-amd64 \
            kamysh/postgres-ai:latest-arm64
          docker manifest push kamysh/postgres-ai:latest

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            docker manifest create kamysh/postgres-ai:$TAG \
              kamysh/postgres-ai:$TAG-amd64 \
              kamysh/postgres-ai:$TAG-arm64
            docker manifest push kamysh/postgres-ai:$TAG
          fi
